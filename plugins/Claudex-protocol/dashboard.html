<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claudex Protocol — 모델 지표 대시보드</title>
<style>
:root{
  --bg:#0d0f14; --panel:#161a22; --panel2:#1d222c; --line:#262c38;
  --ink:#e8ebf0; --mut:#8b93a3; --acc:#0169cc; --acc2:#b06dff;
  --cc:#22c55e; --cx:#f59e0b;
  --ok:#22c55e; --part:#f59e0b; --fail:#ef4444; --na:#64748b;
  --d1:#3b82f6; --d2:#22c55e; --d3:#f59e0b; --d4:#ef4444;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif}
header{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
h1{font-size:18px;margin:0;font-weight:600}
h1 span{color:var(--mut);font-weight:400;font-size:13px;margin-left:8px}
.wrap{padding:24px;max-width:1240px;margin:0 auto}
.controls{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
select,button{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
button:hover,select:hover{border-color:var(--acc)}
button.danger{border-color:#5b2626;color:#f87171}
button.danger:hover{background:#2a1416;border-color:#ef4444}
.status{font-size:12px;color:var(--mut)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.card .n{font-size:24px;font-weight:700}
.card .l{color:var(--mut);font-size:12px;margin-top:2px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:820px){.grid{grid-template-columns:1fr}}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px;overflow-x:auto}
.panel h2{font-size:14px;margin:0 0 14px;font-weight:600}
.panel h2 small{color:var(--mut);font-weight:400;font-size:12px;margin-left:6px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:right;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
th:first-child,td:first-child{text-align:left}
th{color:var(--mut);font-weight:500;font-size:12px}
tbody tr:hover{background:var(--panel2)}
.bar-row{display:flex;align-items:center;gap:10px;margin:7px 0}
.bar-lbl{width:110px;font-size:12px;color:var(--mut);flex:none;text-align:right;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--panel2);border-radius:6px;height:22px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;min-width:2px;transition:width .4s}
.bar-val{position:absolute;right:8px;top:0;line-height:22px;font-size:11px;color:var(--ink)}
.stack{display:flex;height:22px;border-radius:6px;overflow:hidden;background:var(--panel2)}
.stack span{display:block;height:100%}
.tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
.t-cc{background:rgba(34,197,94,.15);color:#4ade80}
.t-cx{background:rgba(245,158,11,.15);color:#fbbf24}
.o-success{color:#4ade80}.o-partial{color:#fbbf24}.o-fail{color:#f87171}.o-na{color:#94a3b8}
.d-하{color:#60a5fa}.d-중{color:#4ade80}.d-상{color:#fbbf24}.d-최상{color:#f87171}
.err{background:#2a1416;border:1px solid #5b2626;color:#f8b4b4;padding:16px;border-radius:12px;line-height:1.6}
.err code{background:#000;padding:2px 6px;border-radius:4px;color:#fca5a5}
.mut{color:var(--mut)}
.legend{display:flex;gap:14px;font-size:12px;color:var(--mut);margin:0 0 10px;flex-wrap:wrap}
.dot{display:inline-block;width:9px;height:9px;border-radius:99px;margin-right:5px;vertical-align:middle}
</style>
</head>
<body>
<header>
  <h1>Claudex Protocol <span>모델 지표 대시보드</span></h1>
  <div class="controls">
    <select id="src">
      <option value="">전체 소스</option>
      <option value="claude-code">claude-code</option>
      <option value="codex">codex</option>
    </select>
    <select id="days">
      <option value="0">전체 기간</option>
      <option value="1">최근 24시간</option>
      <option value="7" selected>최근 7일</option>
      <option value="30">최근 30일</option>
    </select>
    <button id="refresh">새로고침</button>
    <button id="wipe" class="danger">전체 삭제</button>
    <span class="status" id="status">로딩…</span>
  </div>
</header>
<div class="wrap" id="app"></div>

<script>
const URL_="https://juaikaqmbulgxpleasoh.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1YWlrYXFtYnVsZ3hwbGVhc29oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MTk3MTUsImV4cCI6MjA5OTE5NTcxNX0.JMCTx-VwhZj-h_5RhclD6OQQm94iLq7-6WdoTXE_SNs";
const CATLBL={simple_bug:"단순버그",mystery_bug:"원인불명버그",feature:"기능추가",refactor:"리팩터링",deep_reasoning:"깊은추론",research:"조사탐색",config_ops:"설정운영",question:"단순질문",unknown:"미분류"};
const DOMLBL={frontend:"프론트",backend:"백엔드",database:"DB",devops:"데브옵스",infra:"인프라",data:"데이터",mobile:"모바일",other:"기타"};
const DIFS=["하","중","상","최상"];
const OCS=[["success","성공","#22c55e"],["partial","부분","#f59e0b"],["fail","실패","#ef4444"],["na","해당없음","#64748b"]];
const OCC={success:"#22c55e",partial:"#f59e0b",fail:"#ef4444",na:"#64748b"};
const $=id=>document.getElementById(id);
const num=n=>n==null?"–":Math.round(n).toLocaleString();
const f2=n=>n==null?"–":n.toFixed(2);
const usd=n=>n==null?"–":"$"+(n<1?n.toFixed(4):n.toFixed(2));
const esc=s=>(s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

async function fetchRows(){
  const days=+$("days").value, src=$("src").value;
  let q=`${URL_}/rest/v1/model_metrics?select=*&order=created_at.desc&limit=5000&source=neq.test`;
  if(days>0){const t=new Date(Date.now()-days*864e5).toISOString();q+=`&created_at=gte.${t}`;}
  if(src)q+=`&source=eq.${src}`;
  const r=await fetch(q,{headers:{apikey:KEY,Authorization:"Bearer "+KEY}});
  if(!r.ok)throw new Error(`HTTP ${r.status}: ${await r.text()}`);
  return r.json();
}

// 모델/키별 집계 (성공률·비용·코드 포함)
function agg(rows,keyFn){
  const m=new Map();
  for(const r of rows){
    const k=keyFn(r); if(k==null)continue;
    let g=m.get(k);
    if(!g){g={k,n:0,out:0,in:0,tc:0,dur:0,durN:0,cost:0,code:0,rt:0,succ:0,part:0,fail:0,na:0};m.set(k,g);}
    g.n++; g.out+=r.output_tokens||0; g.in+=r.input_tokens||0; g.tc+=r.tool_calls||0;
    g.cost+=r.cost_usd||0; g.code+=r.code_lines||0; g.rt+=r.reasoning_tokens||0;
    if(r.duration_ms){g.dur+=r.duration_ms;g.durN++;}
    if(r.outcome==="success")g.succ++; else if(r.outcome==="partial")g.part++;
    else if(r.outcome==="fail")g.fail++; else g.na++;
  }
  return [...m.values()];
}
const rate=g=>{const d=g.succ+g.part+g.fail; return d?g.succ/d:null;};

function bars(items,color){
  const max=Math.max(1,...items.map(i=>i.v));
  return items.map(i=>`<div class="bar-row"><div class="bar-lbl">${esc(i.l)}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${i.v/max*100}%;background:${typeof color=="function"?color(i):color}"></div>
    <span class="bar-val">${i.disp!=null?i.disp:i.v}</span></div></div>`).join("");
}
function ocLegend(){return `<div class="legend">${OCS.map(o=>`<span><span class="dot" style="background:${o[2]}"></span>${o[1]}</span>`).join("")}</div>`;}
function ocStack(g){
  const parts=[["succ",OCC.success],["part",OCC.partial],["fail",OCC.fail],["na",OCC.na]];
  const tot=g.n||1;
  return `<div class="stack" title="성공 ${g.succ} / 부분 ${g.part} / 실패 ${g.fail} / 해당없음 ${g.na}">
    ${parts.map(([k,c])=>g[k]?`<span style="width:${g[k]/tot*100}%;background:${c}"></span>`:"").join("")}</div>`;
}

function render(rows){
  const app=$("app");
  if(!rows.length){app.innerHTML=`<div class="panel mut">데이터 없음.</div>`;return;}
  const cc=rows.filter(r=>r.source==="claude-code").length, cx=rows.filter(r=>r.source==="codex").length;
  const models=agg(rows,r=>r.model).sort((a,b)=>b.n-a.n);
  const cats=agg(rows,r=>r.category).sort((a,b)=>b.n-a.n);
  const doms=agg(rows,r=>r.domain).sort((a,b)=>b.n-a.n);
  const totCost=rows.reduce((s,r)=>s+(r.cost_usd||0),0);
  const totCode=rows.reduce((s,r)=>s+(r.code_lines||0),0);
  const allOc={succ:0,part:0,fail:0,na:0,n:rows.length};
  rows.forEach(r=>{if(r.outcome==="success")allOc.succ++;else if(r.outcome==="partial")allOc.part++;else if(r.outcome==="fail")allOc.fail++;else allOc.na++;});
  const globalRate=rate(allOc);
  const difCnt=k=>{const o=Object.fromEntries(DIFS.map(d=>[d,0]));rows.forEach(r=>{const v=r[k];if(v in o)o[v]++;});return o;};
  const difW=difCnt("difficulty"), difL=difCnt("difficulty_llm");
  const difColor={"하":"#3b82f6","중":"#22c55e","상":"#f59e0b","최상":"#ef4444"};

  const mNames=models.map(m=>m.k);
  const ocMatrix=mNames.map(mn=>{const sub=rows.filter(r=>r.model===mn);const g={m:mn,tot:sub.length,succ:0,part:0,fail:0,na:0};sub.forEach(r=>{if(r.outcome==="success")g.succ++;else if(r.outcome==="partial")g.part++;else if(r.outcome==="fail")g.fail++;else g.na++;});return g;});

  app.innerHTML=`
  <div class="cards">
    <div class="card"><div class="n">${rows.length}</div><div class="l">총 기록</div></div>
    <div class="card"><div class="n">${models.length}</div><div class="l">모델 수</div></div>
    <div class="card"><div class="n" style="color:#4ade80">${globalRate==null?"–":Math.round(globalRate*100)+"%"}</div><div class="l">전체 성공률</div></div>
    <div class="card"><div class="n">${usd(totCost)}</div><div class="l">총 비용(추정)</div></div>
    <div class="card"><div class="n">${num(totCode)}</div><div class="l">코드 라인 합</div></div>
    <div class="card"><div class="n" style="color:#4ade80">${cc}</div><div class="l">claude-code</div></div>
    <div class="card"><div class="n" style="color:#fbbf24">${cx}</div><div class="l">codex</div></div>
  </div>

  <div class="panel">
    <h2>모델 비교 <small>성공률·비용·산출 핵심 지표</small></h2>
    ${ocLegend()}
    <table><thead><tr><th>모델</th><th>건수</th><th>성공률</th><th>결과분포</th><th>평균비용</th><th>총비용</th><th>평균출력</th><th>평균tool</th><th>코드라인/건</th><th>추론토큰/건</th><th>평균시간(s)</th></tr></thead>
    <tbody>${models.map(m=>{const rt=rate(m);return `<tr>
      <td>${esc(m.k)||"<span class=mut>?</span>"}</td>
      <td>${m.n}</td>
      <td style="color:${rt==null?"var(--mut)":rt>=0.7?"#4ade80":rt>=0.4?"#fbbf24":"#f87171"}">${rt==null?"–":Math.round(rt*100)+"%"}</td>
      <td style="width:130px">${ocStack(m)}</td>
      <td>${usd(m.cost/m.n)}</td><td>${usd(m.cost)}</td>
      <td>${num(m.out/m.n)}</td><td>${(m.tc/m.n).toFixed(1)}</td>
      <td>${num(m.code/m.n)}</td><td>${num(m.rt/m.n)}</td>
      <td>${m.durN?num(m.dur/m.durN/1000):"–"}</td></tr>`;}).join("")}</tbody></table>
  </div>

  <div class="grid">
    <div class="panel"><h2>모델별 성공률</h2>${bars(models.filter(m=>rate(m)!=null).map(m=>({l:m.k||"?",v:Math.round(rate(m)*100),disp:Math.round(rate(m)*100)+"%"})),i=>i.v>=70?"#22c55e":i.v>=40?"#f59e0b":"#ef4444")}</div>
    <div class="panel"><h2>모델별 총비용</h2>${bars(models.map(m=>({l:m.k||"?",v:+m.cost.toFixed(4),disp:usd(m.cost)})),"var(--acc2)")}</div>
  </div>

  <div class="grid">
    <div class="panel"><h2>카테고리 분포</h2>${bars(cats.map(c=>({l:CATLBL[c.k]||c.k||"?",v:c.n})),"var(--acc2)")}</div>
    <div class="panel"><h2>도메인 분포</h2>${doms.length?bars(doms.map(d=>({l:DOMLBL[d.k]||d.k||"?",v:d.n})),"#0ea5e9"):'<div class="mut">데이터 없음(구버전 행)</div>'}</div>
  </div>

  <div class="grid">
    <div class="panel"><h2>난이도 <small>작업량 기반</small></h2>${bars(DIFS.map(d=>({l:d,v:difW[d],k:d})),i=>difColor[i.k])}</div>
    <div class="panel"><h2>난이도 <small>프롬프트 본질(LLM)</small></h2>${bars(DIFS.map(d=>({l:d,v:difL[d],k:d})),i=>difColor[i.k])}</div>
  </div>

  <div class="panel">
    <h2>모델 × 결과</h2>
    ${ocLegend()}
    <table><thead><tr><th>모델</th><th class="o-success">성공</th><th class="o-partial">부분</th><th class="o-fail">실패</th><th class="o-na">해당없음</th><th>성공률</th><th>합계</th></tr></thead>
    <tbody>${ocMatrix.map(g=>{const d=g.succ+g.part+g.fail;const r=d?g.succ/d:null;return `<tr><td>${esc(g.m)||"?"}</td>
      <td class="o-success">${g.succ||""}</td><td class="o-partial">${g.part||""}</td><td class="o-fail">${g.fail||""}</td><td class="o-na">${g.na||""}</td>
      <td>${r==null?"–":Math.round(r*100)+"%"}</td><td><b>${g.tot}</b></td></tr>`;}).join("")}</tbody></table>
  </div>

  <div class="panel">
    <h2>최근 기록 <small>30건</small></h2>
    <table><thead><tr><th>시각</th><th>소스</th><th>모델</th><th>프로젝트</th><th>카테고리</th><th>도메인</th><th>난이도</th><th>결과</th><th>비용</th><th>출력</th><th>tool</th><th>코드</th><th>시간(s)</th></tr></thead>
    <tbody>${rows.slice(0,30).map(r=>`<tr>
      <td class="mut">${new Date(r.created_at).toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})}</td>
      <td><span class="tag ${r.source==="codex"?"t-cx":"t-cc"}">${esc(r.source||"?")}</span></td>
      <td>${esc(r.model)||"?"}</td><td class="mut">${esc(r.project)||"–"}</td>
      <td>${esc(CATLBL[r.category]||r.category||"?")}</td>
      <td class="mut">${esc(DOMLBL[r.domain]||r.domain||"–")}</td>
      <td class="d-${r.difficulty}">${esc(r.difficulty)||"–"}${r.difficulty_llm&&r.difficulty_llm!==r.difficulty?`<span class="mut">/${esc(r.difficulty_llm)}</span>`:""}</td>
      <td class="o-${r.outcome||"na"}">${({success:"성공",partial:"부분",fail:"실패"})[r.outcome]||"–"}</td>
      <td>${usd(r.cost_usd)}</td>
      <td>${num(r.output_tokens)}</td><td>${r.tool_calls??"–"}</td>
      <td>${r.code_lines?num(r.code_lines):"–"}</td>
      <td>${r.duration_ms?num(r.duration_ms/1000):"–"}</td></tr>`).join("")}</tbody></table>
  </div>`;
}

async function load(){
  $("status").textContent="로딩…";
  try{
    const rows=await fetchRows();
    render(rows);
    $("status").textContent=`${rows.length}건 · ${new Date().toLocaleTimeString("ko-KR")}`;
  }catch(e){
    const rls=/permission|policy|401|403/i.test(e.message);
    $("app").innerHTML=`<div class="err"><b>읽기 실패.</b><br>${esc(e.message)}<br><br>
    ${rls?`anon 읽기 정책 필요. Supabase SQL Editor:<br>
    <code>create policy mm_select_anon on public.model_metrics for select to anon using (true);</code>`:""}</div>`;
    $("status").textContent="오류";
  }
}
async function wipe(){
  if(!confirm("전체 기록을 삭제합니다. 되돌릴 수 없습니다. 계속?"))return;
  if(prompt('정말 삭제하려면 아래에 "삭제" 입력:')!=="삭제"){$("status").textContent="삭제 취소";return;}
  $("status").textContent="삭제 중…";
  try{
    const r=await fetch(`${URL_}/rest/v1/model_metrics?id=gte.0`,{method:"DELETE",headers:{apikey:KEY,Authorization:"Bearer "+KEY,Prefer:"return=minimal"}});
    if(!r.ok)throw new Error(`HTTP ${r.status}: ${await r.text()}`);
    $("status").textContent="삭제 완료"; load();
  }catch(e){
    const rls=/permission|policy|401|403/i.test(e.message);
    alert("삭제 실패: "+e.message+(rls?'\n\nanon DELETE 정책 필요:\ncreate policy mm_delete_anon on public.model_metrics for delete to anon using (true);':""));
    $("status").textContent="삭제 오류";
  }
}
$("wipe").onclick=wipe;
$("refresh").onclick=load;
$("src").onchange=load;
$("days").onchange=load;
load();
setInterval(load,60000);
</script>
</body>
</html>
