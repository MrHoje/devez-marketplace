name: Sync gajae-code

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      version:
        description: gajae-code version (e.g. v0.9.0, empty = latest)
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Run sync
        id: sync
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            bun run scripts/sync-gajae.ts --version="$INPUT_VERSION"
          else
            bun run scripts/sync-gajae.ts
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: sync: gajae-code update
          title: Sync gajae-code to latest
          branch: sync/gajae-update
          delete-branch: true
          body: |
            gajae-code 최신 버전으로 hoje-code 스킬을 동기화합니다.

            - 원본: https://github.com/Yeachan-Heo/gajae-code
            - 트리거: ${{ github.event_name }}

            ## 적용 규칙
            - `.gjc/` → `.hoje/`
            - `gjc` → `hoje`
            - `GJC` → `Hoje-Code`
            - 스킬명 매핑: deep-interview→hoje-ask, ralplan→hoje-plan, ultragoal→hoje-goals

            > PR은 자동 생성되었습니다. 충돌이나 적응 규칙이 최신 변경사항을 완전히 커버하지 못할 수 있으니 리뷰 후 머지하세요.
